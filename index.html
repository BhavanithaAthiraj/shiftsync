<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftSync Prototype</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        h2, h3 { margin-top: 0; color: #1e293b; }
        h3 { margin-bottom: 12px; font-size: 18px; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px;}

        .progress-container {
            background: #e2e8f0;
            border-radius: 9999px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .task-list {
            margin: 20px 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .task-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 12px;
        }

        .gatekeeper-panel {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .gatekeeper-panel.passed {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }

        textarea {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 8px;
            box-sizing: border-box;
            margin-top: 8px;
            font-size: 14px;
            resize: none;
        }

        .punch-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #94a3b8;
            cursor: not-allowed;
            margin-top: 20px;
            transition: background-color 0.2s ease;
        }

        .punch-btn.active {
            background-color: var(--success);
            cursor: pointer;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .badge-locked { background: #fee2e2; color: var(--danger); }
        .badge-ready { background: #dcfce7; color: var(--success); }

        /* History Log Style */
        .history-card {
            background: #f1f5f9;
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .history-time { font-weight: bold; color: #64748b; font-size: 12px; }
        .history-notes { margin-top: 4px; font-style: italic; color: #334155; word-break: break-word;}
        .clear-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            float: right;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Shift Handover</h2>
    
    <div id="statusBadge" class="status-badge badge-locked">🔒 PUNCH-OUT LOCKED</div>

    <!-- Progress Tracker -->
    <div>
        <span style="font-weight: 600;">Shift Task Progress: <span id="progressText">0%</span></span>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
    </div>

    <!-- Core Checklists -->
    <div class="task-list">
        <div class="task-item">
            <input type="checkbox" class="task-check" id="t1">
            <label for="t1">Safety inspection completed</label>
        </div>
        <div class="task-item">
            <input type="checkbox" class="task-check" id="t2">
            <label for="t2">Equipment log clean & updated</label>
        </div>
        <div class="task-item">
            <input type="checkbox" class="task-check" id="t3">
            <label for="t3">Workstation area cleared/sanitized</label>
        </div>
    </div>

    <!-- Gatekeeper Engine UI -->
    <div id="gatekeeperPanel" class="gatekeeper-panel">
        <strong id="gatekeeperMessage" style="color: var(--danger);">⚠️ Requirements Not Met:</strong>
        <p style="margin: 4px 0 12px 0; font-size: 14px; color: #64748b;">You must hit 100% completion and provide shift hand-off notes to punch out.</p>
        
        <label for="notes" style="font-weight: 600; font-size: 14px;">Mandatory Hand-off Notes:</label>
        <textarea id="notes" placeholder="Describe outstanding exceptions, machine statuses, or alerts for the incoming shift..."></textarea>
    </div>

    <button id="punchBtn" class="punch-btn" disabled>PUNCH OUT</button>
</div>

<!-- Shift Handover Logs Feed -->
<div class="app-container">
    <button id="clearHistory" class="clear-btn">Clear Logs</button>
    <h3>📋 Shift History Logs</h3>
    <div id="historyFeed">
        <p style="color: #64748b; font-size: 14px; text-align: center;" id="emptyMsg">No shift logs recorded yet.</p>
    </div>
</div>

<script>
    const checkboxes = document.querySelectorAll('.task-check');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const notesInput = document.getElementById('notes');
    const punchBtn = document.getElementById('punchBtn');
    const gatekeeperPanel = document.getElementById('gatekeeperPanel');
    const gatekeeperMessage = document.getElementById('gatekeeperMessage');
    const statusBadge = document.getElementById('statusBadge');
    const historyFeed = document.getElementById('historyFeed');
    const emptyMsg = document.getElementById('emptyMsg');
    const clearHistoryBtn = document.getElementById('clearHistory');

    // 1. Auto-Load Existing Drafts & History Data
    function loadSavedData() {
        // Load Draft State
        checkboxes.forEach(cb => {
            const savedState = localStorage.getItem(`draft_${cb.id}`);
            if (savedState === 'true') cb.checked = true;
        });
        const savedNotes = localStorage.getItem('draft_notes');
        if (savedNotes) notesInput.value = savedNotes;

        // Render History Logs
        renderHistory();
        evaluateGatekeeper();
    }

    // 2. Save Current Draft Progress Live
    function saveDraft() {
        checkboxes.forEach(cb => {
            localStorage.setItem(`draft_${cb.id}`, cb.checked);
        });
        localStorage.setItem('draft_notes', notesInput.value);
    }

    // 3. Core Gatekeeper Processing Logic
    function evaluateGatekeeper() {
        const total = checkboxes.length;
        const checked = document.querySelectorAll('.task-check:checked').length;
        const percentage = Math.round((checked / total) * 100);

        progressBar.style.width = `${percentage}%`;
        progressText.innerText = `${percentage}%`;

        const tasksComplete = (percentage === 100);
        const notesFilled = (notesInput.value.trim().length > 10); 

        if (tasksComplete && notesFilled) {
            punchBtn.disabled = false;
            punchBtn.classList.add('active');
            gatekeeperPanel.classList.add('passed');
            gatekeeperMessage.innerHTML = "✅ Gatekeeper Validation Passed";
            gatekeeperMessage.style.color = "var(--success)";
            statusBadge.innerText = "🔓 READY TO PUNCH OUT";
            statusBadge.className = "status-badge badge-ready";
        } else {
            punchBtn.disabled = true;
            punchBtn.classList.remove('active');
            gatekeeperPanel.classList.remove('passed');
            statusBadge.innerText = "🔒 PUNCH-OUT LOCKED";
            statusBadge.className = "status-badge badge-locked";
            
            if (!tasksComplete && !notesFilled) {
                gatekeeperMessage.innerHTML = "⚠️ Requirements Not Met:";
            } else if (!tasksComplete) {
                gatekeeperMessage.innerHTML = "⚠️ Tasks Incomplete (Must be 100%):";
            } else if (!notesFilled) {
                gatekeeperMessage.innerHTML = "⚠️ Hand-off Notes Required:";
            }
            gatekeeperMessage.style.color = "var(--danger)";
        }
    }

    // 4. Render logs array from LocalStorage to Screen UI
    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('shift_history')) || [];
        if (history.length === 0) {
            emptyMsg.style.display = 'block';
            historyFeed.querySelectorAll('.history-card').forEach(el => el.remove());
            return;
        }
        
        emptyMsg.style.display = 'none';
        // Clean dynamic cards before rerendering
        historyFeed.querySelectorAll('.history-card').forEach(el => el.remove());

        // Display logs, newest first
        history.reverse().forEach(log => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.innerHTML = `
                <div class="history-time">📅 ${log.timestamp}</div>
                <div>Status: <span style="color:var(--success); font-weight:bold;">Passed ✅</span></div>
                <div class="history-notes"><strong>Notes:</strong> ${log.notes}</div>
            `;
            historyFeed.appendChild(card);
        });
    }

    // Event Listeners for Live Updates
    checkboxes.forEach(cb => cb.addEventListener('change', () => {
        saveDraft();
        evaluateGatekeeper();
    }));
    
    notesInput.addEventListener('input', () => {
        saveDraft();
        evaluateGatekeeper();
    });

    // 5. Commit Punch Out and Clear Draft Cache
    punchBtn.addEventListener('click', () => {
        const timestamp = new Date().toLocaleString();
        const newLog = {
            timestamp: timestamp,
            notes: notesInput.value.trim()
        };

        // Save entry into history array
        const history = JSON.parse(localStorage.getItem('shift_history')) || [];
        history.push(newLog);
        localStorage.setItem('shift_history', JSON.stringify(history));

        // Clear draft cache inputs
        checkboxes.forEach(cb => {
            cb.checked = false;
            localStorage.removeItem(`draft_${cb.id}`);
        });
        notesInput.value = '';
        localStorage.removeItem('draft_notes');

        // Reset UI Status
        evaluateGatekeeper();
        renderHistory();

        alert('🎉 Shift Handover Log Saved Successfully to local storage!');
    });

    // Clear whole local logs database
    clearHistoryBtn.addEventListener('click', () => {
        if(confirm("Are you sure you want to clear the entire handover log history?")) {
            localStorage.removeItem('shift_history');
            renderHistory();
        }
    });

    // Initialize Application Lifecycle
    loadSavedData();
</script>

</body>
</html>
