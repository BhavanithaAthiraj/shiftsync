<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftSync Enterprise</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        h2, h3 { margin-top: 0; color: #1e293b; }
        h3 { margin-bottom: 12px; font-size: 18px; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px;}

        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #475569;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fff;
        }

        .progress-container {
            background: #e2e8f0;
            border-radius: 9999px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        .progress-bar {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .task-list {
            margin: 20px 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .task-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 12px;
        }

        .gatekeeper-panel {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .gatekeeper-panel.passed {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }

        textarea {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 8px;
            box-sizing: border-box;
            margin-top: 8px;
            font-size: 14px;
            resize: none;
        }

        .punch-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #94a3b8;
            cursor: not-allowed;
            margin-top: 20px;
            transition: background-color 0.2s ease;
        }

        .punch-btn.active {
            background-color: var(--success);
            cursor: pointer;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .badge-locked { background: #fee2e2; color: var(--danger); }
        .badge-ready { background: #dcfce7; color: var(--success); }

        /* History Log Layout */
        .history-card {
            background: #f1f5f9;
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .history-time { font-weight: bold; color: #475569; font-size: 12px; margin-bottom: 4px;}
        .history-meta { font-size: 13px; color: #334155; margin-bottom: 4px;}
        .history-notes { margin-top: 6px; font-style: italic; color: #1e293b; word-break: break-word; background: #fff; padding: 6px; border-radius: 4px; border: 1px solid #e2e8f0;}
        
        .action-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }
        .export-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .clear-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Shift Handover</h2>
    
    <div id="statusBadge" class="status-badge badge-locked">🔒 PUNCH-OUT LOCKED</div>

    <!-- Metadata Context Fields -->
    <div class="form-group">
        <label for="operatorName">Operator Name *</label>
        <input type="text" id="operatorName" class="form-control" placeholder="Enter your full name">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label for="shiftType">Shift *</label>
            <select id="shiftType" class="form-control">
                <option value="Morning">Morning</option>
                <option value="Evening">Evening</option>
                <option value="Night">Night</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label for="stationId">Station/Machine ID *</label>
            <input type="text" id="stationId" class="form-control" placeholder="e.g. CNC-04">
        </div>
    </div>

    <!-- Progress Tracker -->
    <div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <span style="font-size: 14px; font-weight: 600;">Task Verification Progress: <span id="progressText">0%</span></span>
    </div>

    <!-- Core Checklists -->
    <div class="task-list">
        <div class="task-item">
            <input type="checkbox" class="task-check" id="t1">
            <label for="t1">Safety inspection completed</label>
        </div>
        <div class="task-item">
            <input type="checkbox" class="task-check" id="t2">
            <label for="t2">Equipment log clean & updated</label>
        </div>
        <div class="task-item">
            <input type="checkbox" class="task-check" id="t3">
            <label for="t3">Workstation area cleared/sanitized</label>
        </div>
    </div>

    <!-- Gatekeeper Engine UI -->
    <div id="gatekeeperPanel" class="gatekeeper-panel">
        <strong id="gatekeeperMessage" style="color: var(--danger);">⚠️ Requirements Not Met:</strong>
        <p style="margin: 4px 0 12px 0; font-size: 13px; color: #64748b;">Complete all metadata fields, hit 100% completion, and provide detailed notes to punch out.</p>
        
        <label for="notes" style="font-weight: 600; font-size: 14px;">Mandatory Hand-off Notes:</label>
        <textarea id="notes" placeholder="Describe outstanding exceptions, tool wear, or instructions for the next operator..."></textarea>
    </div>

    <button id="punchBtn" class="punch-btn" disabled>PUNCH OUT</button>
</div>

<!-- Shift Handover Logs Feed -->
<div class="app-container">
    <div class="action-buttons">
        <h3>📋 Shift History Logs</h3>
        <div>
            <button id="exportCsv" class="export-btn" style="display:none;">Export CSV</button>
            <button id="clearHistory" class="clear-btn">Clear Logs</button>
        </div>
    </div>
    <div id="historyFeed" style="margin-top: 10px;">
        <p style="color: #64748b; font-size: 14px; text-align: center;" id="emptyMsg">No shift logs recorded yet.</p>
    </div>
</div>

<script>
    const checkboxes = document.querySelectorAll('.task-check');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const operatorInput = document.getElementById('operatorName');
    const shiftSelect = document.getElementById('shiftType');
    const stationInput = document.getElementById('stationId');
    const notesInput = document.getElementById('notes');
    const punchBtn = document.getElementById('punchBtn');
    const gatekeeperPanel = document.getElementById('gatekeeperPanel');
    const gatekeeperMessage = document.getElementById('gatekeeperMessage');
    const statusBadge = document.getElementById('statusBadge');
    const historyFeed = document.getElementById('historyFeed');
    const emptyMsg = document.getElementById('emptyMsg');
    const clearHistoryBtn = document.getElementById('clearHistory');
    const exportCsvBtn = document.getElementById('exportCsv');

    // 1. Auto-Load Existing Drafts & History Data
    function loadSavedData() {
        // Load Text & Selection Drafts
        if (localStorage.getItem('draft_operator')) operatorInput.value = localStorage.getItem('draft_operator');
        if (localStorage.getItem('draft_shift')) shiftSelect.value = localStorage.getItem('draft_shift');
        if (localStorage.getItem('draft_station')) stationInput.value = localStorage.getItem('draft_station');
        if (localStorage.getItem('draft_notes')) notesInput.value = localStorage.getItem('draft_notes');

        // Load Checkbox Drafts
        checkboxes.forEach(cb => {
            if (localStorage.getItem(`draft_${cb.id}`) === 'true') cb.checked = true;
        });

        renderHistory();
        evaluateGatekeeper();
    }

    // 2. Save Current Form Inputs to Cache
    function saveDraft() {
        localStorage.setItem('draft_operator', operatorInput.value);
        localStorage.setItem('draft_shift', shiftSelect.value);
        localStorage.setItem('draft_station', stationInput.value);
        localStorage.setItem('draft_notes', notesInput.value);
        checkboxes.forEach(cb => {
            localStorage.setItem(`draft_${cb.id}`, cb.checked);
        });
    }

    // 3. Upgraded Gatekeeper Processing Logic
    function evaluateGatekeeper() {
        const total = checkboxes.length;
        const checked = document.querySelectorAll('.task-check:checked').length;
        const percentage = Math.round((checked / total) * 100);

        progressBar.style.width = `${percentage}%`;
        progressText.innerText = `${percentage}%`;

        // Check validation boundaries
        const metaValid = operatorInput.value.trim().length > 2 && stationInput.value.trim().length > 1;
        const tasksComplete = (percentage === 100);
        const notesFilled = (notesInput.value.trim().length > 10); 

        if (metaValid && tasksComplete && notesFilled) {
            punchBtn.disabled = false;
            punchBtn.classList.add('active');
            gatekeeperPanel.classList.add('passed');
            gatekeeperMessage.innerHTML = "✅ Gatekeeper Validation Passed";
            gatekeeperMessage.style.color = "var(--success)";
            statusBadge.innerText = "🔓 READY TO PUNCH OUT";
            statusBadge.className = "status-badge badge-ready";
        } else {
            punchBtn.disabled = true;
            punchBtn.classList.remove('active');
            gatekeeperPanel.classList.remove('passed');
            statusBadge.innerText = "🔒 PUNCH-OUT LOCKED";
            statusBadge.className = "status-badge badge-locked";
            
            if (!metaValid) {
                gatekeeperMessage.innerHTML = "⚠️ Fill out Operator & Station ID:";
            } else if (!tasksComplete) {
                gatekeeperMessage.innerHTML = "⚠️ Tasks Incomplete (Must be 100%):";
            } else if (!notesFilled) {
                gatekeeperMessage.innerHTML = "⚠️ Detailed Hand-off Notes Required:";
            }
            gatekeeperMessage.style.color = "var(--danger)";
        }
    }

    // 4. Render Logs from LocalStorage
    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('shift_history')) || [];
        
        if (history.length === 0) {
            emptyMsg.style.display = 'block';
            exportCsvBtn.style.display = 'none';
            historyFeed.querySelectorAll('.history-card').forEach(el => el.remove());
            return;
        }
        
        emptyMsg.style.display = 'none';
        exportCsvBtn.style.display = 'inline-block';
        historyFeed.querySelectorAll('.history-card').forEach(el => el.remove());

        // Display logs, newest first
        [...history].reverse().forEach(log => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.innerHTML = `
                <div class="history-time">📅 ${log.timestamp}</div>
                <div class="history-meta">
                    <strong>Op:</strong> ${log.operator} | 
                    <strong>Shift:</strong> ${log.shift} | 
                    <strong>Station:</strong> ${log.station}
                </div>
                <div class="history-notes"><strong>Handover Notes:</strong> ${log.notes}</div>
            `;
            historyFeed.appendChild(card);
        });
    }

    // 5. Export Logs to Downloadable CSV File
    function exportToCSV() {
        const history = JSON.parse(localStorage.getItem('shift_history')) || [];
        if (history.length === 0) return;

        // Establish CSV headers
        let csvContent = "data:text/csv;charset=utf-8,Timestamp,Operator,Shift,Station ID,Handover Notes\n";

        // Build records escape quotes to prevent format breaks
        history.forEach(log => {
            const cleanNotes = log.notes.replace(/"/g, '""');
            const cleanOp = log.operator.replace(/"/g, '""');
            const cleanStation = log.station.replace(/"/g, '""');
            csvContent += `"${log.timestamp}","${cleanOp}","${log.shift}","${cleanStation}","${cleanNotes}"\n`;
        });

        // Trigger dynamic system browser download
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `ShiftSync_Logs_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Event Listeners for Live Processing
    [operatorInput, shiftSelect, stationInput, notesInput].forEach(element => {
        element.addEventListener('input', () => { saveDraft(); evaluateGatekeeper(); });
        element.addEventListener('change', () => { saveDraft(); evaluateGatekeeper(); });
    });
    checkboxes.forEach(cb => cb.addEventListener('change', () => { saveDraft(); evaluateGatekeeper(); }));

    // 6. Commit Punch Out and Wipe Active Cache
    punchBtn.addEventListener('click', () => {
        const timestamp = new Date().toLocaleString();
        const newLog = {
            timestamp: timestamp,
            operator: operatorInput.value.trim(),
            shift: shiftSelect.value,
            station: stationInput.value.trim(),
            notes: notesInput.value.trim()
        };

        const history = JSON.parse(localStorage.getItem('shift_history')) || [];
        history.push(newLog);
        localStorage.setItem('shift_history', JSON.stringify(history));

        // Wipe only operational inputs (leave operator profile intact as convenience)
        notesInput.value = '';
        stationInput.value = '';
        checkboxes.forEach(cb => {
            cb.checked = false;
            localStorage.removeItem(`draft_${cb.id}`);
        });
        localStorage.removeItem('draft_notes');
        localStorage.removeItem('draft_station');

        saveDraft();
        evaluateGatekeeper();
        renderHistory();

        alert('🎉 Shift Handover recorded! Logs updated successfully.');
    });

    clearHistoryBtn.addEventListener('click', () => {
        if(confirm("Are you sure you want to clear the entire handover log history?")) {
            localStorage.removeItem('shift_history');
            renderHistory();
        }
    });

    exportCsvBtn.addEventListener('click', exportToCSV);

    // Initial load call
    loadSavedData();
</script>

</body>
</html>
